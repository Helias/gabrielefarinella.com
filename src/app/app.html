<a
  href="#about"
  class="sr-only focus:not-sr-only focus:absolute focus:left-2 focus:top-2 focus:z-[60] focus:rounded focus:bg-white focus:px-4 focus:py-2 focus:text-[rgba(70,82,87,1)]"
>
  {{ 'nav.skipToContent' | transloco }}
</a>

<app-navbar />

<main style="padding-top: var(--navbar-height);">
  <app-hero />
  <app-about />

  <app-work-section
    sectionId="documentary"
    titleKey="work.documentary.title"
    descKey="work.documentary.description"
    [dark]="true"
    [items]="documentaryItems"
  />

  <app-work-section
    sectionId="commercial"
    titleKey="work.commercial.title"
    descKey="work.commercial.description"
    [dark]="false"
    [items]="commercialItems"
  />

  <app-work-section
    sectionId="music"
    titleKey="work.music.title"
    descKey="work.music.description"
    [dark]="true"
    [items]="musicItems"
  />

  <app-trusted-by />
  <app-contact />
</main>

<app-footer />
